# Pin collection to the core suite + the M5 service suite (m5-cutover.md Verification:
# `pytest tests service/tests`) so the isolated H26 spike under experiments/h26/ is never
# auto-discovered here. The spike has heavy deps the hermetic core suite must not import
# and its own runner, so leaking it into this rootdir would both break collection and
# inflate the green floor. H26 is run separately:
#   cd experiments/h26 && pytest
[pytest]
testpaths = tests service/tests
