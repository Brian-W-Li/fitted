# Pin the fitted_core suite's collection to tests/ so the isolated H26 spike under
# experiments/h26/ is never auto-discovered here. The spike has heavy deps the hermetic
# core suite must not import and its own runner, so leaking it into this rootdir would
# both break collection and inflate the >=715-green floor. H26 is run separately:
#   cd experiments/h26 && pytest
[pytest]
testpaths = tests
